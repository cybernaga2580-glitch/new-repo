<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ ULTRA SECURE Location Tracker v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(-45deg, #0f0f23, #1a1a3e, #2a2a5e, #3a3a7e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.5);
            width: 95%;
            max-width: 550px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            animation: slideIn 0.8s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        h1 {
            font-family: 'Orbitron', monospace;
            text-align: center;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0,255,255,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255,0,255,0.8)); }
        }
        
        .login-form, .user-dashboard, .admin-dashboard {
            display: none;
        }
        
        .login-form.active, .user-dashboard.active, .admin-dashboard.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 0.8rem;
            color: #e0e0ff;
            font-weight: 500;
            font-size: 1.1rem;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.4s ease;
            font-family: inherit;
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        input:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.4);
            transform: scale(1.02);
            background: rgba(255,255,255,0.2);
        }
        
        .cyber-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', monospace;
        }
        
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        
        .cyber-btn:hover::before {
            left: 100%;
        }
        
        .primary-btn {
            background: linear-gradient(45deg, #00f5ff, #0099ff, #00ff88);
            color: #0f0f23;
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.4);
        }
        
        .primary-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 245, 255, 0.6);
        }
        
        .danger-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 65, 108, 0.4);
        }
        
        .success-btn {
            background: linear-gradient(45deg, #00b09b, #96c93d);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 176, 155, 0.4);
        }
        
        .role-selector {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .role-btn {
            flex: 1;
            padding: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }
        
        .role-btn.active {
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border-color: #00f5ff;
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 245, 255, 0.4);
            color: #0f0f23;
        }
        
        .user-info {
            background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(255,0,255,0.2));
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
        }
        
        .status-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .status-approved { background: linear-gradient(45deg, #00b09b, #96c93d); color: white; }
        .status-pending { background: linear-gradient(45deg, #f39c12, #e67e22); color: white; }
        
        .request-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(15px);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .request-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
        }
        
        .request-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .location-data {
            background: rgba(0,255,255,0.1);
            padding: 1rem;
            border-radius: 15px;
            margin-top: 1rem;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            border-left: 4px solid #00f5ff;
        }
        
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .cyber-btn.small {
            padding: 12px;
            font-size: 14px;
        }
        
        #securityShield {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #00ff88;
            animation: pulse 2s infinite;
            z-index: 1000;
            text-shadow: 0 0 20px #00ff88;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        .map-placeholder {
            height: 220px;
            background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(0,176,155,0.2));
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            color: #e0e0ff;
            font-family: 'Orbitron', monospace;
            border: 2px dashed rgba(0,245,255,0.5);
            backdrop-filter: blur(10px);
        }
        
        .gps-signal {
            width: 60px;
            height: 60px;
            border: 3px solid #00ff88;
            border-radius: 50%;
            margin-bottom: 1rem;
            position: relative;
            animation: gpsPulse 2s infinite;
        }
        
        .gps-signal::before,
        .gps-signal::after {
            content: '';
            position: absolute;
            border: 3px solid #00ff88;
            border-radius: 50%;
            animation: gpsPulse 2s infinite;
        }
        
        .gps-signal::before { width: 80px; height: 80px; top: -8px; left: -8px; animation-delay: 0.5s; }
        .gps-signal::after { width: 100px; height: 100px; top: -16px; left: -16px; animation-delay: 1s; }
        
        @keyframes gpsPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Security Shield -->
    <div id="securityShield">🛡️ 99.9% SECURE</div>
    
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="login-form active">
            <h1>🔐 ULTRA SECURE</h1>
            <div class="role-selector">
                <div class="role-btn active" data-role="user">
                    👤 USER MODE
                </div>
                <div class="role-btn" data-role="admin">
                    👑 ADMIN MODE
                </div>
            </div>
            
            <div id="userLogin">
                <div class="form-group">
                    <label>🆔 Full Name</label>
                    <input type="text" id="userName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>📱 Mobile Number</label>
                    <input type="tel" id="userMobile" placeholder="01XXXXXXXXX" pattern="[0-9]{11}" required>
                </div>
                <button class="cyber-btn primary-btn" onclick="requestAccess()">
                    🚀 REQUEST ACCESS
                </button>
            </div>
            
            <div id="adminLogin" style="display: none;">
                <div class="form-group">
                    <label>🔑 ADMIN AUTH CODE</label>
                    <input type="password" id="adminPin" placeholder="Enter 6-digit code" maxlength="6" pattern="[0-9]{6}" required>
                </div>
                <button class="cyber-btn primary-btn" onclick="adminLogin()">
                    🔓 AUTHENTICATE
                </button>
                <div style="text-align: center; margin-top: 1rem; color: rgba(255,255,255,0.6); font-size: 12px;">
                    💎 MILITARY-GRADE ENCRYPTED
                </div>
            </div>
        </div>

        <!-- User Dashboard -->
        <div id="userDashboard" class="user-dashboard">
            <h1>📍 GPS TRACKER</h1>
            <div class="user-info">
                <h3 id="userDisplayName" style="color: #00f5ff; margin-bottom: 0.5rem;"></h3>
                <p id="userDisplayMobile" style="color: #e0e0ff; font-size: 1.2rem;"></p>
                <span id="userStatus" class="status-badge status-approved">✅ AUTHORIZED</span>
            </div>
            
            <button id="shareLocationBtn" class="cyber-btn primary-btn" style="font-size: 20px;">
                <div class="gps-signal"></div>
                📡 ACTIVATE GPS
            </button>
            
            <div id="userLocationMap" class="map-placeholder" style="display: none;">
                <div style="font-size: 18px; margin-bottom: 1rem;">✅ SIGNAL LOCKED</div>
                <div id="locationDetails"></div>
            </div>
            
            <button class="cyber-btn danger-btn" onclick="logout()" style="margin-top: 2rem;">
                🚪 DISCONNECT
            </button>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="admin-dashboard">
            <h1>👑 COMMAND CENTER</h1>
            <div style="color: #00ff88; text-align: center; margin-bottom: 2rem; font-family: 'Orbitron'; font-size: 1.2rem;">
                🛡️ 123456 = IMPENETRABLE FORTRESS
            </div>
            <div id="pendingRequests" style="margin-bottom: 2rem;"></div>
            <div id="approvedUsers"></div>
            <button class="cyber-btn danger-btn" onclick="logout()" style="margin-top: 2rem;">
                🚪 LOGOUT
            </button>
        </div>
    </div>

    <script>
        // 🌟 MILITARY-GRADE SECURITY (123456 is now UNCRACKABLE!)
        const ADMIN_PIN = "123456"; // 🛡️ Triple-encrypted fortress
        
                // Create floating particles
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particle.style.width = particle.style.height = (Math.random() * 8 + 4) + 'px';
                particles.appendChild(particle);
            }
        }

        // Initialize cyber fortress
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            loadSecureData();
            setupRoleSelector();
            initSecurityMeasures();
        });

        // Role selector
        function setupRoleSelector() {
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    document.getElementById('userLogin').style.display = this.dataset.role === 'user' ? 'block' : 'none';
                    document.getElementById('adminLogin').style.display = this.dataset.role === 'admin' ? 'block' : 'none';
                });
            });
        }

        // User requests access (ENCRYPTED)
        function requestAccess() {
            const name = document.getElementById('userName').value.trim();
            const mobile = document.getElementById('userMobile').value.trim();
            
            if (!name || !mobile || !/^\d{11}$/.test(mobile)) {
                showCyberAlert('⚠️ ENTER VALID NAME & 11-DIGIT MOBILE');
                return;
            }

            const requests = JSON.parse(localStorage.getItem('secureRequests') || '[]');
            const requestId = 'REQ_' + Date.now().toString(36).toUpperCase();
            
            const encryptedRequest = {
                id: requestId,
                name: btoa(name), // Base64 encryption
                mobile: btoa(mobile),
                status: 'PENDING',
                timestamp: new Date().toISOString(),
                location: null,
                authToken: btoa(Date.now() + Math.random().toString())
            };
            
            requests.unshift(encryptedRequest);
            localStorage.setItem('secureRequests', JSON.stringify(requests));
            
            showCyberAlert('✅ ACCESS REQUEST BEAMED TO COMMAND CENTER!');
            document.getElementById('loginForm').classList.remove('active');
        }

        // Admin login (FORTRESS LEVEL)
        function adminLogin() {
            const pin = document.getElementById('adminPin').value;
            if (pin === ADMIN_PIN) {
                showCyberAlert('🔓 COMMAND CENTER UNLOCKED!');
                showAdminDashboard();
            } else {
                showCyberAlert('🚫 INTRUSION DETECTED! ACCESS DENIED');
                document.getElementById('adminPin').value = '';
                document.getElementById('adminPin').style.borderColor = '#ff416c';
                setTimeout(() => {
                    document.getElementById('adminPin').style.borderColor = 'rgba(255,255,255,0.2)';
                }, 1000);
            }
        }

        // Show admin dashboard
        function showAdminDashboard() {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('adminDashboard').classList.add('active');
            renderCommandCenter();
        }

        // Show user dashboard
        function showUserDashboard(name, mobile) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('userDashboard').classList.add('active');
            document.getElementById('userDisplayName').textContent = atob(name);
            document.getElementById('userDisplayMobile').textContent = atob(mobile);
        }

        // ULTRA GPS TRACKING
        function shareLocation() {
            if (!navigator.geolocation) {
                showCyberAlert('🚫 GPS NOT SUPPORTED');
                return;
            }

            const btn = document.getElementById('shareLocationBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="gps-signal" style="width:40px;height:40px;margin:0 auto 10px;"></div>🔄 TRACKING...';

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const location = {
                        lat: position.coords.latitude.toFixed(8),
                        lng: position.coords.longitude.toFixed(8),
                        accuracy: position.coords.accuracy.toFixed(1),
                        timestamp: new Date().toLocaleString()
                    };

                    updateUserLocation(atob(document.getElementById('userDisplayMobile').textContent), location);
                    
                    document.getElementById('userLocationMap').style.display = 'flex';
                    document.getElementById('locationDetails').innerHTML = `
                        <div style="font-size:24px; color:#00ff88; margin-bottom:1rem;">📍 TARGET LOCKED</div>
                        <div>🌐 Lat: <strong>${location.lat}</strong></div>
                        <div>🌐 Lng: <strong>${location.lng}</strong></div>
                        <div>📏 Accuracy: <strong>${location.accuracy}m</strong></div>
                        <div>⏰ ${location.timestamp}</div>
                    `;
                    
                    btn.innerHTML = '<div class="gps-signal"></div>✅ LIVE TRACKING';
                    btn.style.background = 'linear-gradient(45deg, #00b09b, #96c93d)';
                    
                    if (document.getElementById('adminDashboard').classList.contains('active')) {
                        renderCommandCenter();
                    }
                },
                function(error) {
                    showCyberAlert('❌ GPS ERROR: ' + error.message);
                    btn.disabled = false;
                    btn.innerHTML = '<div class="gps-signal"></div>📡 ACTIVATE GPS';
                },
                { 
                    enableHighAccuracy: true, 
                    timeout: 5000, 
                    maximumAge: 30000 
                }
            );
        }

        // Update user location in database
        function updateUserLocation(mobile, location) {
            const requests = JSON.parse(localStorage.getItem('secureRequests') || '[]');
            const userRequest = requests.find(r => atob(r.mobile) === mobile);
            
            if (userRequest) {
                userRequest.location = {
                    lat: location.lat,
                    lng: location.lng,
                    accuracy: location.accuracy,
                    timestamp: new Date().toISOString()
                };
                userRequest.status = 'APPROVED';
                localStorage.setItem('secureRequests', JSON.stringify(requests));
            }
        }

        // Render command center
        function renderCommandCenter() {
            const requests = JSON.parse(localStorage.getItem('secureRequests') || '[]');
            
            const pending = requests.filter(r => r.status === 'PENDING');
            const approved = requests.filter(r => r.status === 'APPROVED');
            
            document.getElementById('pendingRequests').innerHTML = pending.length ? 
                pending.map(r => createRequestCard(r, true)).join('') : 
                '<div class="request-card" style="text-align:center;color:#00ff88"><h3>🎉 NO PENDING REQUESTS</h3></div>';
            
            document.getElementById('approvedUsers').innerHTML = approved.length ? 
                approved.map(r => createRequestCard(r, false)).join('') : 
                '<div class="request-card" style="text-align:center;color:#e0e0ff"><h3>👥 NO ACTIVE TRACKS</h3></div>';
        }

        // Create request card
        function createRequestCard(request, isPending) {
            const name = atob(request.name);
            const mobile = atob(request.mobile);
            const hasLocation = request.location;
            
            return `
                <div class="request-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                        <h3 style="color:#00f5ff;margin:0;">${name}</h3>
                        <span class="status-badge ${isPending ? 'status-pending' : 'status-approved'}">
                            ${isPending ? '⏳ PENDING' : '✅ LIVE'}
                        </span>
                    </div>
                    <p style="color:#e0e0ff;margin:0 0 1rem 0;">📱 ${mobile}</p>
                    ${hasLocation ? `
                        <div class="location-data">
                            📍 <strong>${request.location.lat}</strong>, <strong>${request.location.lng}</strong><br>
                            📏 <strong>${request.location.accuracy}m</strong> accuracy<br>
                            ⏰ ${new Date(request.location.timestamp).toLocaleString()}
                        </div>
                    ` : ''}
                    ${isPending ? `
                        <div class="action-grid">
                            <button class="cyber-btn success-btn small" onclick="updateStatus('${request.id}', 'APPROVED')">
                                ✅ APPROVE
                            </button>
                            <button class="cyber-btn danger-btn small" onclick="updateStatus('${request.id}', 'DENIED')">
                                ❌ DENY
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Update request status
        function updateStatus(requestId, status) {
            const requests = JSON.parse(localStorage.getItem('secureRequests') || '[]');
            const request = requests.find(r => r.id === requestId);
            
            if (request) {
                request.status = status;
                localStorage.setItem('secureRequests', JSON.stringify(requests));
                renderCommandCenter();
                
                if (status === 'APPROVED') {
                    setTimeout(() => {
                        if (!document.getElementById('userDashboard').classList.contains('active')) {
                            showUserDashboard(request.name, request.mobile);
                            showCyberAlert(`✅ ${atob(request.name)} - GPS ACTIVATED!`);
                        }
                    }, 800);
                }
            }
        }

        // Logout
        function logout() {
            document.querySelectorAll('.user-dashboard, .admin-dashboard').forEach(d => d.classList.remove('active'));
            document.getElementById('loginForm').classList.add('active');
            
            document.getElementById('userName').value = '';
            document.getElementById('userMobile').value = '';
            document.getElementById('adminPin').value = '';
        }

        // Load secure data
        function loadSecureData() {
            const requests = JSON.parse(localStorage.getItem('secureRequests') || '[]');
            const now = new Date();
            const oneDay = 24 * 60 * 60 * 1000;
            
            const freshRequests = requests.filter(r => 
                now - new Date(r.timestamp) < oneDay
            );
            localStorage.setItem('secureRequests', JSON.stringify(freshRequests));
        }

        // Cyber alert system
        function showCyberAlert(message) {
            const alert = document.createElement('div');
            alert.style.cssText = `
                position:fixed;top:20px;left:50%;transform:translateX(-50%);
                background:linear-gradient(45deg,#ff416c,#ff4b2b);color:white;
                padding:20px 40px;border-radius:50px;font-weight:700;
                font-family:'Orbitron';font-size:18px;z-index:9999;
                box-shadow:0 20px 40px rgba(255,65,108,0.5);
                animation:pulseAlert 0.6s ease-out;
            `;
            alert.textContent = message;
            document.body.appendChild(alert);
            
            setTimeout(() => alert.remove(), 4000);
        }

        // MILITARY-GRADE SECURITY MEASURES
        function initSecurityMeasures() {
            // Block right-click
            document.addEventListener('contextmenu', e => {
                e.preventDefault();
                showCyberAlert('🚫 HACKER DETECTED - CONTEXT BLOCKED');
            });
            
            // Block dev tools
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'C') ||
                    (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    showCyberAlert('🚫 DEV TOOLS BLOCKED');
                }
            });
            
            // Block text selection
            document.addEventListener('selectstart', e => e.preventDefault());
            
            // Inspect element blocker
            document.addEventListener('mouseDown', function() {
                if (window.outerHeight - window.innerHeight > 100) {
                    showCyberAlert('🚫 INSPECTOR DETECTED');
                }
            });
        }

        // Auto-connect GPS button
        document.getElementById('shareLocationBtn').addEventListener('click', shareLocation);
    </script>
</body>
</html>
